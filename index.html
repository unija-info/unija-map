<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Navigasi UniSZA - Pilih Kampus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <img src="https://view.unija.info/media/logo/unija-info.png" alt="Unija Info Logo">
        <h1>Peta Navigasi Interaktif UniSZA</h1>
    </header>

    <main>
        <div class="campus-list">

            <!-- Kampus Gong Badak -->
            <div class="campus-group">
                <h2 class="campus-group-title">Kampus Gong Badak</h2>
                <div class="campus-cards">
                    <a href="/kgb/map/" class="campus-card">
                        <div class="campus-card-icon">🗺️</div>
                        <div class="campus-card-text">
                            <strong>Peta Kampus</strong>
                            <span>Peta interaktif yang memaparkan 110 lokasi</span>
                        </div>
                    </a>
                    <a href="/kgb/bus-stop/" class="campus-card">
                        <div class="campus-card-icon">🚌</div>
                        <div class="campus-card-text">
                            <strong>Peta Bas Stop</strong>
                            <span>Pick up dan drop point bas ekspres</span>
                        </div>
                    </a>
                </div>
            </div>

            <!-- Kampus Besut -->
            <div class="campus-group">
                <h2 class="campus-group-title">Kampus Besut</h2>
                <div class="campus-cards">
                    <div class="campus-card disabled">
                        <div class="campus-card-icon">🏛️</div>
                        <div class="campus-card-text">
                            <strong>Akan datang</strong>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kampus Kota -->
            <div class="campus-group">
                <h2 class="campus-group-title">Kampus Kota</h2>
                <div class="campus-cards">
                    <div class="campus-card disabled">
                        <div class="campus-card-icon">🏙️</div>
                        <div class="campus-card-text">
                            <strong>Akan datang</strong>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2025 | Projek Komuniti oleh <a href="https://unija.info" target="_blank">unija.info</a></p>
    </footer>

<!-- VERCEL WEB ANALYTICS SCRIPT -->

  window.va = window.va || function () { (window.va.q = window.va.q || []).push(arguments); };
</script>
<script src="/_vercel/insights/script.js" defer></script>
<!-- END VERCEL SCRIPT -->
    
</body>
</html>
